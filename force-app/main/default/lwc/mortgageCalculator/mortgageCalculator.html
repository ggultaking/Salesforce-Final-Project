<template>
<lightning-card title="Mortgage Engine">

<lightning-tabset>

    <!-- SUMMARY -->
    <lightning-tab label="Summary">
        <p>Monthly: {monthlyPayment}</p>
        <p>Principal: {principal}</p>
        <p>Interest: {interest}</p>
        <p>LTV: {ltv}%</p>
    </lightning-tab>

    <!-- AMORTIZATION TABLE -->
    <lightning-tab label="Amortization">

        <table class="slds-table slds-table_bordered slds-table_cell-buffer">

            <thead>
                <tr>
                    <th>Month</th>
                    <th>Payment</th>
                    <th>Interest</th>
                    <th>Principal</th>
                    <th>Balance</th>
                </tr>
            </thead>

            <tbody>
                <template for:each={amortization} for:item="a">
                    <tr key={a.month}>
                        <td>{a.month}</td>
                        <td>{a.payment}</td>
                        <td>{a.interest}</td>
                        <td>{a.principal}</td>
                        <td>{a.balance}</td>
                    </tr>
                </template>
            </tbody>

        </table>

    </lightning-tab>

    <!-- AFFORDABILITY -->
    <lightning-tab label="Affordability">

        <lightning-input
            type="number"
            name="income"
            label="Income"
            onchange={handleChange}>
        </lightning-input>

        <lightning-input
            type="number"
            name="debts"
            label="Debts"
            onchange={handleChange}>
        </lightning-input>

        <lightning-button
            label="Calculate Affordability"
            onclick={calculateAffordability}>
        </lightning-button>

        <p>Max Home Price: {affordable}</p>

        <lightning-button
            label="Apply Mortgage"
            variant="brand"
            onclick={applyMortgage}>
        </lightning-button>

    </lightning-tab>

    <!-- CHART -->
    <lightning-tab label="Chart">

        <div class="chart-wrapper">

            <template for:each={amortization} for:item="a">

                <div key={a.month} class="chart-row">

                    <div class="month">Month {a.month}</div>

                    <div class="bar-container">

                        <div class="principal-bar"
                             style={a.principalStyle}>
                        </div>

                        <div class="interest-bar"
                             style={a.interestStyle}>
                        </div>

                    </div>

                </div>

            </template>

        </div>

    </lightning-tab>

</lightning-tabset>

</lightning-card>
</template>
