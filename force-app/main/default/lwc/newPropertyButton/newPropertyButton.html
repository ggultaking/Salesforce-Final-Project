<template>
    <lightning-button
        label="New Property"
        variant="brand"
        onclick={openFlow}>
    </lightning-button>

    <template if:true={showFlow}>
        <section style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;display:flex;align-items:center;justify-content:center;">
            <div style="position:absolute;width:100%;height:100%;background:rgba(15,23,42,0.6);backdrop-filter:blur(4px);" onclick={closeFlow}></div>
            <div style="position:relative;width:92vw;max-width:720px;max-height:90vh;background:#fff;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,0.22);">
                <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 24px 14px;border-bottom:1px solid #f3f4f6;background:#fff;flex-shrink:0;">
                    <span style="font-size:16px;font-weight:800;color:#111827;">New Property</span>
                    <button onclick={closeFlow} style="background:#f3f4f6;border:none;border-radius:50%;width:32px;height:32px;font-size:14px;cursor:pointer;color:#6b7280;display:flex;align-items:center;justify-content:center;">&#10005;</button>
                </div>
                <div style="flex:1;overflow-y:auto;padding:20px 24px 24px;">
                    <lightning-flow
                        flow-api-name="Property_Listing"
                        onstatuschange={handleFlowFinish}>
                    </lightning-flow>
                </div>
            </div>
        </section>
    </template>
</template>
